  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

702 78 690 Q 66 682 58 710 Z\"><\u002Fpath>\n      <path d=\"M 58 710 Q 44 702 36 690 Q 48 682 58 710 Z\"><\u002Fpath>\n      <!-- Outer petals -->\n      <path d=\"M 58 710 Q 40 722 36 738 Q 50 736 58 710 Z\"><\u002Fpath>\n      <path d=\"M 58 710 Q 76 722 80 738 Q 66 736 58 710 Z\"><\u002Fpath>\n      <path d=\"M 58 710 Q 28 708 18 696 Q 28 686 58 710 Z\"><\u002Fpath>\n      <path d=\"M 58 710 Q 88 708 98 696 Q 88 686 58 710 Z\"><\u002Fpath>\n      <!-- Stem + water lines -->\n      <line x1=\"58\" y1=\"722\" x2=\"58\" y2=\"752\"><\u002Fline>\n      <path d=\"M 58 736 Q 48 728 40 720\"><\u002Fpath>\n      <path d=\"M 58 736 Q 68 728 76 720\"><\u002Fpath>\n      <path d=\"M 20 752 Q 58 744 96 752\" stroke-width=\"1\"><\u002Fpath>\n      <path d=\"M 14 762 Q 58 753 102 762\" stroke-width=\"1\"><\u002Fpath>\n    <\u002Fg>\n\n    <!-- BOTTOM RIGHT: Detailed lotus -->\n    <g opacity=\"0.16\" stroke-width=\"1.3\">\n      <circle cx=\"335\" cy=\"710\" r=\"5\"><\u002Fcircle>\n      <path d=\"M 335 705 Q 326 692 335 681 Q 344 692 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 346 698 353 687 Q 342 680 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 322 698 316 687 Q 326 680 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 323 716 321 730 Q 332 728 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 347 716 349 730 Q 338 728 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 312 702 304 692 Q 314 684 335 705 Z\"><\u002Fpath>\n      <path d=\"M 335 705 Q 358 702 366 692 Q 356 684 335 705 Z\"><\u002Fpath>\n      <line x1=\"335\" y1=\"715\" x2=\"335\" y2=\"742\"><\u002Fline>\n      <path d=\"M 335 730 Q 326 722 320 714\"><\u002Fpath>\n      <path d=\"M 335 730 Q 344 722 350 714\"><\u002Fpath>\n    <\u002Fg>\n\n    <!-- Encouraging texts -->\n    <text x=\"8\" y=\"660\" style=\"font-family: Georgia, serif; font-size: 10px; fill: #5a7a6a; opacity: 0.16; letter-spacing: 0.18em; font-style: italic;\">you've got this<\u002Ftext>\n    <text x=\"290\" y=\"300\" style=\"font-family: Georgia, serif; font-size: 9px; fill: #5a7a6a; opacity: 0.14; letter-spacing: 0.2em; font-style: italic;\">rest well<\u002Ftext>\n    <text x=\"300\" y=\"560\" style=\"font-family: Georgia, serif; font-size: 9px; fill: #5a7a6a; opacity: 0.13; letter-spacing: 0.15em; font-style: italic;\">move more<\u002Ftext>\n    <text x=\"12\" y=\"218\" style=\"font-family: Georgia, serif; font-size: 9px; fill: #5a7a6a; opacity: 0.13; letter-spacing: 0.15em; font-style: italic;\">stay strong<\u002Ftext>\n\n    <!-- Small scattered leaves mid-screen -->\n    <g opacity=\"0.12\" stroke-width=\"1.2\">\n      <path d=\"M 185 560 C 192 548 206 550 204 560 C 200 568 185 560 185 560 Z\"><\u002Fpath>\n      <path d=\"M 196 556 Q 196 562 196 568\"><\u002Fpath>\n      <path d=\"M 200 580 C 206 570 218 572 216 580 C 212 588 200 580 200 580 Z\"><\u002Fpath>\n      <path d=\"M 210 577 Q 210 582 210 587\"><\u002Fpath>\n    <\u002Fg>\n\n    <!-- Small arrow doodles suggesting movement -->\n    <g opacity=\"0.11\" stroke-width=\"1.4\">\n      <path d=\"M 355 480 Q 370 490 360 502\"><\u002Fpath>\n      <path d=\"M 360 502 L 356 494 M 360 502 L 368 496\"><\u002Fpath>\n      <path d=\"M 22 400 Q 8 412 18 426\"><\u002Fpath>\n      <path d=\"M 18 426 L 14 416 M 18 426 L 26 420\"><\u002Fpath>\n    <\u002Fg>\n\n  <\u002Fg>\n<\u002Fsvg>\n  <div style=\"width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 72px;\">\n\n    <!-- Header -->\n    <div style=\"padding: 30px 22px 18px; display: flex; align-items: center; justify-content: space-between;\">\n      <div>\n        <div style=\"font-family: 'DM Serif Display', serif; font-size: 26px; color: #2c3a2e; letter-spacing: -0.3px; line-height: 1;\">Pausa<\u002Fdiv>\n        <div style=\"font-size: 12px; color: #9aaa9c; margin-top: 5px;\">{{ sessionStatus }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ toggleTimer }}\" style=\"background: {{ btnBg }}; border: 1.5px solid #5a7a6a; color: {{ btnColor }}; border-radius: 100px; padding: 10px 24px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.2s;\">{{ btnLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- TIMER TAB -->\n    <sc-if value=\"{{ isTimerTab }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding: 0 22px; display: flex; flex-direction: column; gap: 12px;\">\n\n        <!-- Work Session Card -->\n        <div style=\"background: #5a7a6a; border-radius: 22px; padding: 22px 24px; box-shadow: 0 4px 24px rgba(90,122,106,0.22);\">\n          <div style=\"font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.65); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;\">Work Session<\u002Fdiv>\n          <div style=\"font-size: 44px; font-weight: 300; color: white; letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1;\">{{ sessionClock }}<\u002Fdiv>\n          <div style=\"margin-top: 14px; background: rgba(255,255,255,0.18); border-radius: 100px; height: 4px; overflow: hidden;\">\n            <div style=\"height: 100%; width: {{ sessionBarPct }}; background: white; border-radius: 100px; transition: width 1s linear;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; margin-top: 8px;\">\n            <div style=\"font-size: 11px; color: rgba(255,255,255,0.6);\">{{ sessionBarLabel }}<\u002Fdiv>\n            <div style=\"font-size: 11px; color: rgba(255,255,255,0.6);\">8h goal<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Micro-break ring card -->\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; gap: 18px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <svg width=\"96\" height=\"96\" viewBox=\"0 0 100 100\" style=\"flex-shrink: 0;\">\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: #e8e4de; stroke-width: 7;\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: {{ microColor }}; stroke-width: 7; stroke-dasharray: {{ C }}; stroke-dashoffset: {{ microOff }}; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50px 50px; transition: stroke-dashoffset 1s linear, stroke 0.5s;\"><\u002Fcircle>\n            <text x=\"50\" y=\"51\" textanchor=\"middle\" style=\"font-size: 13px; font-weight: 600; fill: #2c3a2e; font-family: 'DM Sans', sans-serif;\">{{ microRemain }}<\u002Ftext>\n            <text x=\"50\" y=\"65\" textanchor=\"middle\" style=\"font-size: 9px; fill: #b0bab3; font-family: 'DM Sans', sans-serif;\">next break<\u002Ftext>\n          <\u002Fsvg>\n          <div>\n            <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e; margin-bottom: 4px;\">Micro-break<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #8aad96; font-weight: 500; margin-bottom: 4px;\">Every 25 min · 45 sec<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #9aaa9c; line-height: 1.6;\">Stand up · Roll shoulders · Look away<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Movement break ring card -->\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; gap: 18px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <svg width=\"96\" height=\"96\" viewBox=\"0 0 100 100\" style=\"flex-shrink: 0;\">\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: #e8e4de; stroke-width: 7;\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: {{ movColor }}; stroke-width: 7; stroke-dasharray: {{ C }}; stroke-dashoffset: {{ movOff }}; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50px 50px; transition: stroke-dashoffset 1s linear, stroke 0.5s;\"><\u002Fcircle>\n            <text x=\"50\" y=\"51\" textanchor=\"middle\" style=\"font-size: 13px; font-weight: 600; fill: #2c3a2e; font-family: 'DM Sans', sans-serif;\">{{ movRemain }}<\u002Ftext>\n            <text x=\"50\" y=\"65\" textanchor=\"middle\" style=\"font-size: 9px; fill: #b0bab3; font-family: 'DM Sans', sans-serif;\">next break<\u002Ftext>\n          <\u002Fsvg>\n          <div>\n            <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e; margin-bottom: 4px;\">Movement Break<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #5a7a6a; font-weight: 500; margin-bottom: 4px;\">Every hour · 3 min<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #9aaa9c; line-height: 1.6;\">Walk · Stretch neck · Reset posture<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Long reset ring card -->\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 18px 20px; display: flex; align-items: center; gap: 18px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <svg width=\"96\" height=\"96\" viewBox=\"0 0 100 100\" style=\"flex-shrink: 0;\">\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: #e8e4de; stroke-width: 7;\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"40\" style=\"fill: none; stroke: {{ longColor }}; stroke-width: 7; stroke-dasharray: {{ C }}; stroke-dashoffset: {{ longOff }}; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50px 50px; transition: stroke-dashoffset 1s linear, stroke 0.5s;\"><\u002Fcircle>\n            <text x=\"50\" y=\"51\" textanchor=\"middle\" style=\"font-size: 13px; font-weight: 600; fill: #2c3a2e; font-family: 'DM Sans', sans-serif;\">{{ longRemain }}<\u002Ftext>\n            <text x=\"50\" y=\"65\" textanchor=\"middle\" style=\"font-size: 9px; fill: #b0bab3; font-family: 'DM Sans', sans-serif;\">next break<\u002Ftext>\n          <\u002Fsvg>\n          <div>\n            <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e; margin-bottom: 4px;\">Long Reset<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #3d5c50; font-weight: 500; margin-bottom: 4px;\">Every 90 min · 12 min<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #9aaa9c; line-height: 1.6;\">Full posture recovery · Rest eyes<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"text-align: center; padding: 10px 0 4px; font-size: 13px; color: #b0bab3;\">{{ motivText }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- EXERCISES TAB -->\n    <sc-if value=\"{{ isExercisesTab }}\">\n      <div style=\"padding: 0 22px; display: flex; flex-direction: column; gap: 14px;\">\n\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 22px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #8aad96; flex-shrink: 0;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e;\">Chin Tucks<\u002Fdiv>\n              <div style=\"font-size: 10px; color: #8aad96; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;\">Every 20–30 min<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px;\">\n            <div style=\"flex-shrink: 0;\">{{ chinAnim }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6b7c6e; line-height: 1.7;\">Gently glide your head straight back — creating a soft double chin — reversing forward-head posture. Hold 3 seconds, 5–10 reps.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 22px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #5a7a6a; flex-shrink: 0;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e;\">Chest Opener<\u002Fdiv>\n              <div style=\"font-size: 10px; color: #5a7a6a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;\">Every hour<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px;\">\n            <div style=\"flex-shrink: 0;\">{{ chestAnim }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6b7c6e; line-height: 1.7;\">Clasp your hands behind your back and gently lift your chest. Hold 20–30 seconds. Counteracts shoulder rounding from typing.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 22px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #8aad96; flex-shrink: 0;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e;\">Shoulder Rolls<\u002Fdiv>\n              <div style=\"font-size: 10px; color: #8aad96; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;\">Every 20–30 min<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px;\">\n            <div style=\"flex-shrink: 0;\">{{ shoulderAnim }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6b7c6e; line-height: 1.7;\">Slowly roll shoulders backward in wide circles. 10 backward reps, then 10 forward. Releases upper-back and neck tension.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #f8f6f2; border-radius: 22px; padding: 22px; box-shadow: 0 2px 16px rgba(90,122,106,0.07);\">\n          <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\">\n            <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #3d5c50; flex-shrink: 0;\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size: 15px; font-weight: 600; color: #2c3a2e;\">Walk &amp; Eye Rest<\u002Fdiv>\n              <div style=\"font-size: 10px; color: #3d5c50; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;\">Every 90 min<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px;\">\n            <div style=\"flex-shrink: 0;\">{{ walkAnim }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #6b7c6e; line-height: 1.7;\">Walk away from your screen for 10–15 min. Use the 20-20-20 rule: look at something 20 ft away for 20 seconds to decompress your eyes.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- LOG TAB -->\n    <sc-if value=\"{{ isLogTab }}\">\n      <div style=\"padding: 0 22px;\">\n        <sc-if value=\"{{ hasLog }}\">\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <sc-for list=\"{{ logItems }}\" as=\"entry\" hint-placeholder-count=\"5\">\n              <div style=\"background: #f8f6f2; border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 14px;\">\n                <div style=\"width: 10px; height: 10px; border-radius: 50%; background: {{ entry.color }}; flex-shrink: 0;\"><\u002Fdiv>\n                <div>\n                  <div style=\"font-size: 14px; font-weight: 500; color: #2c3a2e;\">{{ entry.label }}<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #9aaa9c;\">{{ entry.timeLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noLog }}\">\n          <div y1=\"10\" x2=\"13.5\" y2=\"12\"><\u002Fline>\n        <\u002Fsvg>\n        Timer\n      <\u002Fbutton>\n      <button onclick=\"{{ setExTab }}\" style=\"flex: 1; border: none; background: transparent; padding: 12px 0 18px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: {{ exTabW }}; color: {{ exTabC }}; transition: color 0.2s;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" style=\"fill: currentColor;\">\n          <circle cx=\"10\" cy=\"4\" r=\"2.2\"><\u002Fcircle>\n          <rect x=\"7\" y=\"7.5\" width=\"6\" height=\"6.5\" rx=\"2\"><\u002Frect>\n          <rect x=\"3\" y=\"9\" width=\"4\" height=\"5\" rx=\"1.5\"><\u002Frect>\n          <rect x=\"13\" y=\"9\" width=\"4\" height=\"5\" rx=\"1.5\"><\u002Frect>\n        <\u002Fsvg>\n        Exercises\n      <\u002Fbutton>\n      <button onclick=\"{{ setLogTab }}\" style=\"flex: 1; border: none; background: transparent; padding: 12px 0 18px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: {{ logTabW }}; color: {{ logTabC }}; transition: color 0.2s;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" style=\"fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round;\">\n          <line x1=\"4\" y1=\"6\" x2=\"16\" y2=\"6\"><\u002Fline>\n          <line x1=\"4\" y1=\"10\" x2=\"16\" y2=\"10\"><\u002Fline>\n          <line x1=\"4\" y1=\"14\" x2=\"11\" y2=\"14\"><\u002Fline>\n        <\u002Fsvg>\n        Log\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 844},\n  &quot;testMode&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;section&quot;: &quot;Timer Settings&quot;},\n  &quot;microIntervalMin&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 25, &quot;min&quot;: 10, &quot;max&quot;: 30, &quot;step&quot;: 5, &quot;unit&quot;: &quot;min&quot;, &quot;section&quot;: &quot;Timer Settings&quot;},\n  &quot;movIntervalMin&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 60, &quot;min&quot;: 30, &quot;max&quot;: 90, &quot;step&quot;: 10, &quot;unit&quot;: &quot;min&quot;, &quot;section&quot;: &quot;Timer Settings&quot;},\n  &quot;longIntervalMin&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 90, &quot;min&quot;: 60, &quot;max&quot;: 120, &quot;step&quot;: 15, &quot;unit&quot;: &quot;min&quot;, &quot;section&quot;: &quot;Timer Settings&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    isRunning: false,\n    timeSinceMicro: 0,\n    timeSinceMovement: 0,\n    timeSinceLong: 0,\n    totalWork: 0,\n    currentBreak: null,\n    breakRemaining: 0,\n    breakStep: 0,\n    activeTab: 'timer',\n    log: [],\n  };\n\n  _interval = null;\n  _audio = null;\n  _C = 2 * Math.PI * 40;\n\n  componentDidMount() {\n    try {\n      const saved = localStorage.getItem('posture-care-log');\n      if (saved) this.setState({ log: JSON.parse(saved) });\n    } catch(e) {}\n  }\n\n  componentWillUnmount() {\n    if (this._interval) clearInterval(this._interval);\n  }\n\n  iv() {\n    const test = this.props.testMode;\n    return {\n      micro:    test ? 15  : (this.props.microIntervalMin  ?? 25) * 60,\n      movement: test ? 30  : (this.props.movIntervalMin    ?? 60) * 60,\n      long:     test ? 60  : (this.props.longIntervalMin   ?? 90) * 60,\n      microDur: test ? 8   : 45,\n      movDur:   test ? 15  : 180,\n      longDur:  test ? 25  : 720,\n    };\n  }\n\n  tone(type) {\n    try {\n      if (!this._audio) this._audio = new (window.AudioContext || window.webkitAudioContext)();\n      const ctx = this._audio;\n      const note = (freq, t, dur) => {\n        const o = ctx.createOscillator(), g = ctx.createGain();\n eight: 114, viewBox: '0 0 86 114' },\n      React.createElement('circle', { cx: 43, cy: 16, r: 14, fill: g }),\n      React.createElement('circle', { cx: 38, cy: 12, r: 2.5, fill: d }),\n      React.createElement('circle', { cx: 48, cy: 12, r: 2.5, fill: d }),\n      React.createElement('rect', { x: 30, y: 33, width: 26, height: 36, rx: 8, fill: p }),\n      React.createElement('g', { style: { animation: 'shoulderL 1.8s ease-in-out infinite', transformOrigin: '26px 40px' } },\n        React.createElement('circle', { cx: 26, cy: 40, r: 8, fill: g }),\n        React.createElement('rect', { x: 3, y: 36, width: 23, height: 8, rx: 4, fill: g })\n      ),\n      React.createElement('g', { style: { animation: 'shoulderR 1.8s ease-in-out infinite', transformOrigin: '60px 40px' } },\n        React.createElement('circle', { cx: 60, cy: 40, r: 8, fill: g }),\n        React.createElement('rect', { x: 60, y: 36, width: 23, height: 8, rx: 4, fill: g })\n      )\n    );\n\n    if (type === 'stand') return React.createElement('svg', { width: 86, height: 114, viewBox: '0 0 86 114' },\n      React.createElement('circle', { cx: 43, cy: 13, r: 12, fill: g }),\n      React.createElement('rect', { x: 32, y: 28, width: 22, height: 32, rx: 7, fill: p }),\n      React.createElement('rect', { x: 10, y: 32, width: 22, height: 7, rx: 3.5, fill: g }),\n      React.createElement('rect', { x: 54, y: 32, width: 22, height: 7, rx: 3.5, fill: g }),\n      React.createElement('rect', { x: 34, y: 62, width: 8, height: 38, rx: 4, fill: p }),\n      React.createElement('rect', { x: 44, y: 62, width: 8, height: 38, rx: 4, fill: p }),\n      React.createElement('text', { x: 74, y: 58, fontSize: 18, fill: d, textAnchor: 'middle', style: { animation: 'float 1.4s ease-in-out infinite' } }, '↑')\n    );\n\n    return React.createElement('svg', { width: 86, height: 114, viewBox: '0 0 86 114' },\n      React.createElement('circle', { cx: 43, cy: 13, r: 12, fill: g }),\n      React.createElement('rect', { x: 32, ps.', anim: 'chin' },\n                 { name: 'Chest Opener',    cue: 'Clasp hands behind back, lift chest gently. Hold 20 seconds.', anim: 'chest' },\n                 { name: 'Shoulder Rolls',  cue: 'Slow backward circles, 10 reps. Shoulders drop fully between rolls.', anim: 'shoulder' }],\n      long:     [{ name: 'Chin Tucks',      cue: '10 reps with 3 second holds. Slow and controlled.', anim: 'chin' },\n                 { name: 'Chest Opener',    cue: 'Hold for 30 seconds. Breathe deeply through the stretch.', anim: 'chest' },\n                 { name: 'Shoulder Rolls',  cue: '10 backward, then 10 forward. Wide and deliberate.', anim: 'shoulder' },\n                 { name: 'Walk & Eye Rest', cue: 'Walk for a few minutes. Look at something 20+ ft away for 20 seconds.', anim: 'walk' }],\n    };\n\n    const bi = BREAK[s.currentBreak] || {};\n    const exList = EX[s.currentBreak] || [];\n    const curEx = exList[Math.min(s.breakStep, exList.length - 1)] || {};\n    const exerciseAnim = s.currentBreak ? this.anim(curEx.anim) : null;\n\n    const LOG_INFO = {\n      micro:    { label: 'Micro-break',    color: '#8aad96' },\n      movement: { label: 'Movement break', color: '#5a7a6a' },\n      long:     { label: 'Long reset',     color: '#3d5c50' },\n    };\n\n    const tab = s.activeTab;\n\n    // Session clock\n    const totalSec = s.totalWork;\n    const sh = Math.floor(totalSec / 3600);\n    const sm = Math.floor((totalSec % 3600) / 60);\n    const ss = totalSec % 60;\n    const sessionClock = sh > 0\n      ? `${sh}:${String(sm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`\n      : `${String(sm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;\n    const goalSec = 8 * 3600;\n    const barPct = Math.min(totalSec / goalSec, 1);\n    const sessionBarPct = Math.round(barPct * 100) + '%';\n    const sessionBarLabel = totalSec < 60 ? 'Just started' : `${this.fmtHM(totalSec)} worked`;\n\n    return {\n      // Session\n      sessionClock,\n      sessionBarPct,\n      sessionBarLabel,\n\n      // Header\n      sessionStatus: s.isRunning\n        ? (s.totalWork < 60 ? 'Session started — great!' : `Working for ${this.fmtHM(s.totalWork)}`)\n        : 'Ready to start your session',\n      btnBg:    s.isRunning ? '#5a7a6a' : 'transparent',\n      btnColor: s.isRunning ? 'white'   : '#5a7a6a',\n      btnLabel: s.isRunning ? 'Pause'   : 'Start',\n      toggleTimer: () => this.toggleTimer(),\n\n      // Rings\n      C,\n      microOff:  this.off(s.timeSinceMicro,    iv.micro),\n      movOff:    this.off(s.timeSinceMovement,  iv.movement),\n      longOff:   this.off(s.timeSinceLong,      iv.long),\n      microRemain: this.fmt(microR),\n      movRemain:   this.fmt(movR),\n      longRemain:  this.fmt(longR),\n      microColor: this.urgency(microR, iv.micro),\n      movColor:   this.urgency(movR,   iv.movement),\n      longColor:  this.urgency(longR,  iv.long),\n      motivText: s.isRunning ? 'Breaks are tracked automatically.' : 'Press Start to begin tracking.',\n\n      // Break overlay\n      showBreak:     !!s.currentBreak,\n      breakColor:    bi.color  || '#5a7a6a',\n      breakBadge:    bi.badge  || '',\n      breakTitle:    bi.title  || '',\n      breakSubtitle: bi.subtitle || '',\n      breakCountdown: s.currentBreak ? this.fmt(s.breakRemaining) : '0:00',\n      exerciseAnim,\n      exName: curEx.name || '',\n      exCue:  curEx.cue  || '',\n      breakDots: exList.map((_, i) => ({ color: i === s.breakStep ? (bi.color || '#5a7a6a') : '#d8d3cc' })),\n      skipBreak: () => this.endBreak(true),\n      doneBreak: () => this.endBreak(false),\n\n      // Tabs\n      isTimerTab:    tab === 'timer',\n      isExercisesTab: tab === 'exercises',\n      isLogTab:      tab === 'log',\n      setTimerTab: () => this.setState({ activeTab: 'timer' }),\n      setExTab:    () => this.setState({ activeTab: 'exercises' }),\n      setLogTab:   () => this.setState({ activeTab: 'log' }),\n      timerTabC: tab === 'timer'     ? '#5a7a6a' : '#b0bab3',\
